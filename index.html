<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ValveTurns">
  <title>ValveTurns</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
      user-select: none;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #a0aec0;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    /* Valve ID row */
    .valve-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 20px;
    }
    .valve-row label { font-size: 14px; color: #a0aec0; white-space: nowrap; }
    .valve-row input {
      flex: 1;
      background: #2d2d4e;
      border: 1px solid #4a4a7a;
      border-radius: 8px;
      color: #ffffff;
      font-size: 16px;
      padding: 8px 12px;
      outline: none;
    }
    .valve-row input:focus { border-color: #63b3ed; }

    /* Big turn display */
    .turn-display {
      background: #16213e;
      border-radius: 20px;
      width: 100%;
      max-width: 360px;
      padding: 28px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 16px;
      border: 1px solid #2d2d4e;
    }

    .turn-number {
      font-size: 96px;
      font-weight: 700;
      line-height: 1;
      color: #63b3ed;
      letter-spacing: -4px;
      transition: color 0.3s;
    }
    .turn-number.active { color: #68d391; }
    .turn-label { font-size: 14px; color: #718096; margin-top: 4px; margin-bottom: 16px; }

    /* Direction badge */
    .direction {
      font-size: 15px;
      font-weight: 600;
      padding: 6px 20px;
      border-radius: 20px;
      background: #2d2d4e;
      color: #a0aec0;
      transition: all 0.3s;
      margin-bottom: 12px;
    }
    .direction.ccw { background: #1c4532; color: #68d391; }
    .direction.cw  { background: #4a1942; color: #f687b3; }

    /* Partial turn bar */
    .partial-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .partial-label { font-size: 12px; color: #4a5568; }
    .partial-bar { width: 100%; height: 6px; background: #2d2d4e; border-radius: 3px; overflow: hidden; }
    .partial-fill { height: 100%; width: 0%; background: #63b3ed; border-radius: 3px; transition: width 0.1s; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 12px;
    }
    button {
      flex: 1;
      padding: 16px 8px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; }

    #btn-start { background: #2f855a; color: #fff; flex: 2; }
    #btn-start.running { background: #c53030; }
    #btn-reset { background: #2d2d4e; color: #a0aec0; flex: 1; }

    /* Status */
    .status { font-size: 13px; color: #718096; margin-bottom: 16px; height: 18px; text-align: center; }
    .status.ok  { color: #68d391; }
    .status.err { color: #fc8181; }

    /* Permission button */
    #btn-permission {
      background: #2b6cb0;
      color: #fff;
      width: 100%;
      max-width: 360px;
      padding: 16px;
      margin-bottom: 16px;
      display: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    /* Mount note */
    .mount-note {
      font-size: 12px;
      color: #4a5568;
      text-align: center;
      max-width: 300px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* Log */
    .log-section { width: 100%; max-width: 360px; }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .log-header span { font-size: 13px; color: #718096; }
    .log-actions { display: flex; gap: 8px; }
    .log-actions button {
      flex: none;
      width: auto;
      padding: 5px 12px;
      font-size: 12px;
      border-radius: 6px;
      font-weight: 500;
    }
    #btn-export { background: #2d2d4e; color: #a0aec0; }
    #btn-clear  { background: #4a1942; color: #f687b3; }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-item {
      background: #16213e;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      border: 1px solid #2d2d4e;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2px 8px;
      align-items: center;
    }
    .log-valve  { font-weight: 600; color: #e2e8f0; }
    .log-turns  { font-size: 18px; font-weight: 700; color: #63b3ed; text-align: right; }
    .log-dir    { font-size: 11px; color: #718096; }
    .log-time   { font-size: 11px; color: #4a5568; text-align: right; }
    .log-dir.ccw { color: #68d391; }
    .log-dir.cw  { color: #f687b3; }

    .empty-log { font-size: 13px; color: #4a5568; text-align: center; padding: 20px 0; }

    /* Confirm overlay */
    .overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
      min-height: 100vh;
    }
    .overlay.visible { display: flex; }
    .confirm-box {
      background: #16213e;
      border: 1px solid #4a4a7a;
      border-radius: 16px;
      padding: 24px 20px;
      max-width: 280px;
      width: 90%;
      text-align: center;
    }
    .confirm-box p { font-size: 15px; color: #e2e8f0; margin-bottom: 8px; font-weight: 600; }
    .confirm-box small { font-size: 13px; color: #718096; display: block; margin-bottom: 20px; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-btns button { flex: 1; padding: 12px; font-size: 15px; border-radius: 10px; }
    #btn-confirm-yes { background: #c53030; color: #fff; }
    #btn-confirm-no  { background: #2d2d4e; color: #a0aec0; }
  </style>
</head>
<body>

  <h1>ValveTurns</h1>

  <div class="valve-row">
    <label>Valve ID</label>
    <input type="text" id="valve-id" placeholder="e.g. V-204"
           autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="turn-display">
    <div class="turn-number" id="turn-count">0.0</div>
    <div class="turn-label">turns</div>
    <div class="direction" id="direction">—</div>
    <div class="partial-wrap">
      <div class="partial-label">partial turn progress</div>
      <div class="partial-bar"><div class="partial-fill" id="partial-fill"></div></div>
    </div>
  </div>

  <div class="status" id="status">Tap Start to begin</div>

  <button id="btn-permission" onclick="requestPermission()">
    Allow Motion Sensor Access
  </button>

  <div class="btn-row">
    <button id="btn-start" onclick="toggleSession()">Start</button>
    <button id="btn-reset" onclick="resetCounter()">Reset</button>
  </div>

  <p class="mount-note">
    Mount phone flat along the valve key handle.<br>
    Screen facing up. Keep it secure — do not hold it.
  </p>

  <div class="log-section">
    <div class="log-header">
      <span id="log-count">Operation log (0)</span>
      <div class="log-actions">
        <button id="btn-export" onclick="exportLog()">Export CSV</button>
        <button id="btn-clear"  onclick="confirmClear()">Clear</button>
      </div>
    </div>
    <div class="log-list" id="log-list">
      <div class="empty-log">No operations logged yet</div>
    </div>
  </div>

  <!-- Clear confirmation overlay -->
  <div class="overlay" id="overlay">
    <div class="confirm-box">
      <p>Clear all log entries?</p>
      <small>This cannot be undone. Export first if you need the data.</small>
      <div class="confirm-btns">
        <button id="btn-confirm-yes" onclick="clearLog()">Yes, clear</button>
        <button id="btn-confirm-no"  onclick="dismissOverlay()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────────────────────
    const NOISE_FLOOR  = 0.008;   // radians — ignores micro-tremor
    const STORAGE_KEY  = 'valveturns_log_v1';

    // ── State ──────────────────────────────────────────────────────────────
    let running          = false;
    let totalTurns       = 0;
    let lastYaw          = null;
    let sessionStart     = null;
    let motionHandler    = null;
    let permissionGranted = false;
    let log              = [];

    // ── Persist log in localStorage ────────────────────────────────────────
    // Survives page refresh, Safari closing, phone restarts.
    // Cleared only when user taps Clear or clears Safari site data.
    function loadLog() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) log = JSON.parse(saved);
      } catch (_) { log = []; }
      renderLog();
    }

    function saveLog() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(log)); }
      catch (_) { setStatus('Storage full — export and clear log', false); }
    }

    // ── Permission ─────────────────────────────────────────────────────────
    function checkPermission() {
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.getElementById('btn-permission').style.display = 'block';
        setStatus('Tap the blue button to allow motion access', false);
      } else {
        permissionGranted = true;
      }
    }

    function requestPermission() {
      DeviceOrientationEvent.requestPermission().then(state => {
        if (state === 'granted') {
          permissionGranted = true;
          document.getElementById('btn-permission').style.display = 'none';
          setStatus('Motion access granted — tap Start', true);
        } else {
          setStatus('Motion access denied — check Settings › Safari', false);
        }
      }).catch(() => setStatus('Permission request failed', false));
    }

    // ── Session ────────────────────────────────────────────────────────────
    function toggleSession() {
      if (!permissionGranted &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        setStatus('Tap "Allow Motion Sensor Access" first', false);
        return;
      }
      running ? stopSession() : startSession();
    }

    function startSession() {
      running      = true;
      totalTurns   = 0;
      lastYaw      = null;
      sessionStart = new Date();

      document.getElementById('btn-start').textContent = 'Stop';
      document.getElementById('btn-start').classList.add('running');
      document.getElementById('turn-count').classList.add('active');
      document.getElementById('btn-reset').disabled = true;
      setStatus('Recording…', true);
      updateDisplay();

      motionHandler = (e) => handleOrientation(e);
      window.addEventListener('deviceorientation', motionHandler, true);
    }

    function stopSession() {
      running = false;
      window.removeEventListener('deviceorientation', motionHandler, true);
      motionHandler = null;

      document.getElementById('btn-start').textContent = 'Start';
      document.getElementById('btn-start').classList.remove('running');
      document.getElementById('turn-count').classList.remove('active');
      document.getElementById('btn-reset').disabled = false;
      setStatus('Session stopped — tap Start for next valve', false);

      const valveId  = document.getElementById('valve-id').value.trim() || 'Unknown';
      const turns    = parseFloat(Math.abs(totalTurns).toFixed(1));
      const dir      = totalTurns >= 0 ? 'CCW' : 'CW';

      if (turns >= 0.1) {
        const entry = {
          valveId,
          turns,
          dir,
          time: sessionStart.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
          date: sessionStart.toLocaleDateString()
        };
        log.unshift(entry);  // newest first
        saveLog();
        renderLog();
      }
    }

    function resetCounter() {
      if (running) return;
      totalTurns = 0;
      lastYaw    = null;
      updateDisplay();
      setStatus('Reset — tap Start to begin', false);
    }

    // ── Sensor ─────────────────────────────────────────────────────────────
    function handleOrientation(event) {
      if (event.alpha === null) return;

      const yaw = event.alpha * Math.PI / 180;

      if (lastYaw === null) { lastYaw = yaw; return; }

      let delta = yaw - lastYaw;
      if (delta >  Math.PI) delta -= 2 * Math.PI;
      if (delta < -Math.PI) delta += 2 * Math.PI;

      if (Math.abs(delta) < NOISE_FLOOR) return;

      totalTurns += delta / (2 * Math.PI);
      lastYaw = yaw;
      updateDisplay();
    }

    // ── Display ────────────────────────────────────────────────────────────
    function updateDisplay() {
      const absTurns = Math.abs(totalTurns);
      const partial  = (absTurns % 1) * 100;

      let dirText  = '—';
      let dirClass = '';
      if (totalTurns >  0.05) { dirText = 'Counterclockwise'; dirClass = 'ccw'; }
      if (totalTurns < -0.05) { dirText = 'Clockwise';        dirClass = 'cw';  }

      document.getElementById('turn-count').textContent  = absTurns.toFixed(1);
      document.getElementById('partial-fill').style.width = partial + '%';

      const dirEl = document.getElementById('direction');
      dirEl.textContent = dirText;
      dirEl.className   = 'direction ' + dirClass;
    }

    // ── Log render ─────────────────────────────────────────────────────────
    function renderLog() {
      const list = document.getElementById('log-list');
      document.getElementById('log-count').textContent =
        'Operation log (' + log.length + ')';

      if (log.length === 0) {
        list.innerHTML = '<div class="empty-log">No operations logged yet</div>';
        return;
      }

      list.innerHTML = log.map(e => `
        <div class="log-item">
          <span class="log-valve">${e.valveId}</span>
          <span class="log-turns">${e.turns.toFixed(1)}</span>
          <span class="log-dir ${e.dir.toLowerCase()}">${e.dir === 'CCW' ? 'Counterclockwise' : 'Clockwise'}</span>
          <span class="log-time">${e.date} ${e.time}</span>
        </div>
      `).join('');
    }

    // ── Clear log ──────────────────────────────────────────────────────────
    function confirmClear() {
      document.getElementById('overlay').classList.add('visible');
    }
    function dismissOverlay() {
      document.getElementById('overlay').classList.remove('visible');
    }
    function clearLog() {
      log = [];
      localStorage.removeItem(STORAGE_KEY);
      renderLog();
      dismissOverlay();
      setStatus('Log cleared', false);
    }

    // ── Export CSV ─────────────────────────────────────────────────────────
    function exportLog() {
      if (log.length === 0) { setStatus('No data to export yet', false); return; }
      const header = 'Valve ID,Turns,Direction,Date,Time\n';
      const rows   = log.map(e =>
        `${e.valveId},${e.turns.toFixed(1)},${e.dir === 'CCW' ? 'Counterclockwise' : 'Clockwise'},${e.date},${e.time}`
      ).join('\n');
      const blob = new Blob([header + rows], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'valve_operations_' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── Status ─────────────────────────────────────────────────────────────
    function setStatus(msg, ok) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className   = 'status ' + (ok ? 'ok' : 'err');
    }

    // ── Wake lock — keep screen on ─────────────────────────────────────────
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
      } catch (_) {}
    }

    // ── Init ───────────────────────────────────────────────────────────────
    loadLog();
    checkPermission();
    requestWakeLock();
  </script>
</body>
</html>
